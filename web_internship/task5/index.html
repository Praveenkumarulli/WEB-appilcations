<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Blogging Platform</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>📝 My Blogging Platform</h1>

    <div class="form-section">
        <input type="hidden" id="editId">
        <input type="text" id="title" placeholder="Enter Blog Title">
        <textarea id="content" placeholder="Write your blog here..."></textarea>
        <button onclick="savePost()">Publish</button>
    </div>

    <div id="posts"></div>
</div>

<script src="script.js"></script>
</body>
</html>
